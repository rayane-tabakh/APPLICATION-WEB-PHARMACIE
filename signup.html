<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PharmaGest - Inscription</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container signup-container">
        <div class="logo-container">
            <svg class="logo-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm-1-11h2v3h3v2h-3v3h-2v-3H8v-2h3V9z" fill="currentColor"/>
            </svg>
            <span class="logo-text">PharmaGest</span>
        </div>

        <div class="login-card">
            <h2>Inscription</h2>
            <p class="subtitle">Créez votre compte client pour commencer vos achats</p>

            <form action="#">
                <div class="input-row">
                    <div class="input-group">
                        <label>Prénom *</label>
                        <input type="text" placeholder="Jean" required>
                    </div>
                    <div class="input-group">
                        <label>Nom *</label>
                        <input type="text" placeholder="Dupont" required>
                    </div>
                </div>

                <div class="input-group">
                    <label>Email *</label>
                    <input type="email" placeholder="jean.dupont@example.fr" required>
                </div>

                <div class="input-group">
                    <label>Téléphone *</label>
                    <input type="tel" placeholder="+33 6 12 34 56 78" required>
                </div>

                <div class="input-group">
                    <label>Adresse</label>
                    <input type="text" placeholder="123 Rue de la Santé, 75000 Paris">
                </div>

                <div class="input-group">
                    <label>Mot de passe *</label>
                    <div class="password-input-wrapper">
                        <input type="password" placeholder="****" required>
                        <span class="password-toggle">👁️</span>
                    </div>
                    <small class="helper-text">Minimum 6 caractères</small>
                </div>

                <div class="input-group">
                    <label>Confirmer le mot de passe *</label>
                    <input type="password" placeholder="****" required>
                </div>

                <button type="submit" class="submit-btn">S'inscrire</button>
            </form>

            <p class="signup-link">Déjà un compte? <a href="index.html">Se connecter</a></p>
        </div>
    </div>

</body>
</html>
