<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PharmaGest - Connexion</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <div class="logo-container">
            <svg class="logo-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm-1-11h2v3h3v2h-3v3h-2v-3H8v-2h3V9z" fill="currentColor"/>
            </svg>
            <span class="logo-text">PharmaGest</span>
        </div>

        <div class="login-card">
            <h2>Connexion</h2>
            <p class="subtitle">Entrez vos identifiants pour accéder à votre espace</p>

            <div class="toggle-container">
                <button class="toggle-btn active">Se connecter</button>
                <button class="toggle-btn">Démo Rapide</button>
            </div>

            <form action="#">
                <div class="input-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="exemple@email.fr">
                </div>

                <div class="input-group">
                    <div class="password-label-container">
                        <label for="password">Mot de passe</label>
                        <a href="#" class="forgot-password">Mot de passe oublié?</a>
                    </div>
                    <div class="password-input-wrapper">
                        <input type="password" id="password" name="password" placeholder="****">
                        <span class="password-toggle">👁️</span>
                    </div>
                </div>

                <button type="submit" class="submit-btn">Se connecter</button>
            </form>

            <p class="signup-link">Pas encore de compte? <a href="#">S'inscrire</a></p>
        </div>

        <div class="footer">
            <p>En vous connectant, vous acceptez nos <a href="#">conditions d'utilisation</a> et notre <a href="#">politique de confidentialité</a></p>
        </div>
    </div>

</body>
</html>
